<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="/static/style.css" />

  <title>IOCL Chatbot</title>
  <style>
    body {
      background-color: #f0f4f8;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 25%;
      min-width: 300px;
      background-color: white;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.15);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .header {
      background-color: #003366;
      color: white;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      font-size: 1.2em;
    }

    #chatbox {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .user-message, .bot-response {
      margin-bottom: 10px;
      padding: 10px;
      border-radius: 8px;
    }

    .user-message {
      background-color: #ff9800;
      color: white;
      align-self: flex-end;
    }

    .bot-response {
      background-color: #2196f3;
      color: white;
      align-self: flex-start;
    }

    .input-area {
      display: flex;
      border-top: 1px solid #ddd;
    }

    #user-input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    #send-btn {
      background-color: #003366;
      color: white;
      border: none;
      padding: 0 20px;
      cursor: pointer;
    }

    #send-btn:hover {
      background-color: #0055aa;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="header">IOCL Chatbot</div>
    <div id="chatbox"></div>
    <div class="input-area">
      <input type="text" id="user-input" placeholder="Ask me something..." />
      <button id="send-btn">Send</button>
    </div>
  </div>

  <script>
    document.getElementById("send-btn").addEventListener("click", function () {
      const userInput = document.getElementById("user-input").value;
      if (!userInput.trim()) return;

      // Show user's message
      const chatbox = document.getElementById("chatbox");
      const userMsg = document.createElement("div");
      userMsg.className = "user-message";
      userMsg.textContent = "🧑 " + userInput;
      chatbox.appendChild(userMsg);

      // Fetch response from backend
      fetch("/ask", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: userInput })
      })
      .then(response => response.json())
      .then(data => {
        const botMsg = document.createElement("div");
        botMsg.className = "bot-response";
        botMsg.textContent = "🤖 " + (data.response || "I didn't get that.");
        chatbox.appendChild(botMsg);
        chatbox.scrollTop = chatbox.scrollHeight;
      })
      .catch(error => {
        const errMsg = document.createElement("div");
        errMsg.className = "bot-response";
        errMsg.textContent = "🤖 Error connecting to backend.";
        chatbox.appendChild(errMsg);
      });

      document.getElementById("user-input").value = "";
    });
  </script>
</body>
</html>
